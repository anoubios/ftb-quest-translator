modLoader="javafml"
loaderVersion="[47,)"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
description='''
Addon for FTB Quests that adds a translate button to the quest view panel.
Translates quest title, subtitle and description on-the-fly using free translation APIs.
Translation is temporary - closing the quest panel restores original text.
'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="[47,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="[1.20.1]"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="ftbquests"
    mandatory=true
    versionRange="*"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="ftblibrary"
    mandatory=true
    versionRange="*"
    ordering="AFTER"
    side="BOTH"
