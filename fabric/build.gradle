plugins {
    id 'fabric-loom' version '1.9-SNAPSHOT'
    id 'maven-publish'
}

version = mod_version
group = mod_group

base {
    archivesName = "${mod_id}-fabric"
}

repositories {
    flatDir {
        dirs 'libs'
    }
}

loom {
    accessWidenerPath = null
}

dependencies {
    // Minecraft & mappings
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings loom.officialMojangMappings()

    // Fabric Loader
    modImplementation "net.fabricmc:fabric-loader:${loader_version}"

    // Fabric API (minimal modules needed)
    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabric_version}"

    // FTB dependencies - compile only
    modCompileOnly files('libs/ftb-quests-fabric-2101.1.23.jar')
    modCompileOnly files('libs/ftb-library-fabric-2101.1.31.jar')

    // At runtime for testing
    modLocalRuntime files('libs/ftb-quests-fabric-2101.1.23.jar')
    modLocalRuntime files('libs/ftb-library-fabric-2101.1.31.jar')
}

processResources {
    inputs.property "id", mod_id
    inputs.property "version", mod_version
    inputs.property "name", mod_name
    inputs.property "minecraft_version", minecraft_version
    inputs.property "loader_version", loader_version

    filesMatching("fabric.mod.json") {
        expand(
            "id": mod_id,
            "version": mod_version,
            "name": mod_name,
            "minecraft_version": minecraft_version,
            "loader_version": loader_version
        )
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
    options.release = 21
}

java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    from("../LICENSE") {
        rename { "${it}_${base.archivesName.get()}" }
    }
}

publishing {
    publications {
        create("mavenJava", MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url = "file://${project.projectDir}/repo"
        }
    }
}
